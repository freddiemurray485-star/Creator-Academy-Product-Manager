<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Overseer | Private Founder Command System</title>
	<meta name="description" content="A private local command system for Freddie Murray's project planning, Roblox Studio work and founder execution.">
	<meta name="robots" content="noindex, nofollow, noarchive">
	<meta name="theme-color" content="#020617">

	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<!-- Overseer uses its own private application stylesheet. -->
	<link rel="stylesheet" href="css/helper-dashboard.css">
	<link rel="icon" href="favicon.ico" sizes="any">
	<link rel="icon" type="image/png" href="favicon.png">
</head>

<body>

	<div class="animated-bg" aria-hidden="true">
		<div class="orb orb-one"></div>
		<div class="orb orb-two"></div>
		<div class="orb orb-three"></div>
		<div class="grid-glow"></div>
	</div>

	<div id="cursorGlow" class="cursor-glow" aria-hidden="true"></div>
	<div id="toast" class="toast hidden">Saved</div>

	<header class="topbar">
		<div class="brand">
			<span class="brand-mark">OV</span>
			<div>
				<h1>Overseer</h1>
				<p>Private Founder Command System</p>
			</div>
		</div>

		<nav class="nav-actions">
			<button id="navHome" class="active" type="button">Overseer</button>
		</nav>
	</header>

	<main id="app" class="app helper-root">
		<section class="helper-loading" aria-label="Loading Overseer">
			<span class="helper-kicker">Mode: Solo Founder</span>
			<h2>Preparing Overseer…</h2>
			<p>Private local project control · this device only.</p>
		</section>
	</main>

	<!-- Overseer intentionally loads no Academy/student application scripts. -->
	<script src="js/helper-dashboard.js"></script>
</body>
</html>
